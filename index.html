<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pause.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="app">
    <!-- Phase: Arrive -->
    <div class="phase active" id="phase-arrive">
      <p class="soft-text">You picked up your phone.</p>
      <p class="soft-text dim">That's okay.</p>
      <button class="gentle-btn" id="btn-begin">pause with me</button>
    </div>

    <!-- Phase: Breathe -->
    <div class="phase" id="phase-breathe">
      <p class="soft-text breath-label" id="breath-label">breathe in</p>
      <p class="soft-text dim" id="breath-count"></p>
    </div>

    <!-- Phase: Name -->
    <div class="phase" id="phase-name">
      <p class="soft-text">Why did you reach for it?</p>
      <div class="reason-grid" id="reason-grid"></div>
    </div>

    <!-- Phase: Reflect -->
    <div class="phase" id="phase-reflect">
      <p class="soft-text" id="reflect-text"></p>
      <p class="soft-text dim" id="reflect-sub"></p>
    </div>

    <!-- Phase: Complete -->
    <div class="phase" id="phase-complete">
      <p class="soft-text" id="complete-text"></p>
      <p class="soft-text dim" id="complete-sub"></p>
      <button class="gentle-btn" id="btn-close">close</button>
    </div>

    <!-- Patterns link -->
    <div id="patterns-link">
      <button class="text-btn" id="btn-patterns">patterns</button>
    </div>

    <!-- Patterns view -->
    <div class="phase" id="phase-patterns">
      <p class="soft-text">Your patterns</p>
      <div id="pattern-list"></div>
      <div class="pattern-actions">
        <button class="text-btn" id="btn-clear">clear everything</button>
        <button class="text-btn" id="btn-back">back</button>
      </div>
    </div>
  </div>

  <script src="main.js" defer></script>
</body>
</html>
